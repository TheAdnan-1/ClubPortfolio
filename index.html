<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Nav-bar Section Starts Here -->
        <nav class="navbar">
            <div class="navbar-logo">
                <a href="#"><img src="resources/logo.png" alt="Logo" class="logo-img"></a>
            </div>
            <div class="navbar-center nav-center-original">
                <ul class="nav-links">
                    <li><a href="#activities">Activities</a></li>
                    <li><a href="#achievements">Achievements</a></li>
                    <li><a href="#about">About</a></li>
                </ul>
            </div>
            <div class="navbar-right">
                <a href="#login" class="nav-auth">Login</a>
                <a href="#register" class="nav-auth">Register</a>
            </div>
            <div class="navbar-hamburger" id="navbarHamburger">
                <i class="fa-solid fa-bars" id="hamburgerIcon"></i>
                <i class="fa-solid fa-circle-xmark" id="closeIcon" style="display:none;"></i>
            </div>
            <div class="sidebar" id="sidebar">
                <ul class="sidebar-links">
                    <li><a href="#activities">Activities</a></li>
                    <li><a href="#achievements">Achievements</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#login">Login</a></li>
                    <li><a href="#register">Register</a></li>
                </ul>
            </div>
        </nav>
        <!-- Nav-bar Section Ends Here -->
        <!-- Main content goes here -->
            <script>
            // Hamburger and sidebar toggle with icon swap
            const hamburger = document.getElementById('navbarHamburger');
            const sidebar = document.getElementById('sidebar');
            const hamburgerIcon = document.getElementById('hamburgerIcon');
            const closeIcon = document.getElementById('closeIcon');

            function openSidebar() {
                sidebar.classList.add('active');
                hamburgerIcon.style.display = 'none';
                closeIcon.style.display = 'inline';
            }
            function closeSidebar() {
                sidebar.classList.remove('active');
                hamburgerIcon.style.display = 'inline';
                closeIcon.style.display = 'none';
            }
            hamburger.addEventListener('click', function(e) {
                if (sidebar.classList.contains('active')) {
                    closeSidebar();
                } else {
                    openSidebar();
                }
            });
            closeIcon.addEventListener('click', function(e) {
                closeSidebar();
                e.stopPropagation();
            });
            // Close sidebar on link click (mobile UX)
            document.querySelectorAll('.sidebar-links a').forEach(link => {
                link.addEventListener('click', () => {
                    closeSidebar();
                });
            });
            // Hide sidebar and reset icons on resize
            window.addEventListener('resize', function() {
                if (window.innerWidth > 800) {
                    sidebar.classList.remove('active');
                    hamburgerIcon.style.display = 'inline';
                    closeIcon.style.display = 'none';
                }
            });
            </script>
    </div>
</body>
</html>
